name: Aliyun-Image-Sync

on:
  repository_dispatch:
    types: [sync-image]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_sync:
        description: '强制同步所有镜像'
        required: false
        default: false
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-images:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Skopeo and jq
        run: |
          sudo apt-get update && sudo apt-get install -y skopeo jq

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.9.1

      # 修复：重命名为准确的阿里云登录
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v2.2.0
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.DOCKER_USERNAME }}  # 建议重命名secret
          password: ${{ secrets.DOCKER_PASSWORD }}  # 建议重命名secret
          logout: false

      # 添加重试函数
      - name: Define retry function
        run: |
          cat > retry.sh << 'EOF'
          retry() {
            local n=1
            local max=3
            local delay=5
            while true; do
              "$@" && break || {
                if [[ $n -lt $max ]]; then
                  ((n++))
                  echo "命令失败，${delay}秒后重试 ($n/$max)..."
                  sleep $delay;
                else
                  echo "重试${max}次后仍然失败"
                  return 1
                fi
              }
            done
          }
          EOF

      - name: Sync Images to Aliyun
        run: |
          set -e
          source retry.sh
          
          declare -A IMAGE_MAP=(
            ["ghcr.io/openclaw/openclaw:latest"]="registry.cn-hangzhou.aliyuncs.com/zi_mu/openclaw:latest"
          )
          
          # 创建状态记录文件
          echo "# 镜像同步状态 - $(date)" > sync_status.md
          
          for SOURCE_IMG in "${!IMAGE_MAP[@]}"; do
            TARGET_IMG=${IMAGE_MAP[$SOURCE_IMG]}
            echo -e "\n===== 检测镜像: $SOURCE_IMG ====="
            
            # 获取源镜像Digest
            SOURCE_DIGEST=$(skopeo inspect "docker://$SOURCE_IMG" 2>/dev/null | jq -r '.Digest')
            if [[ -z "$SOURCE_DIGEST" || "$SOURCE_DIGEST" == "null" ]]; then
              echo "⚠️  获取源镜像Digest失败，跳过：$SOURCE_IMG"
              echo "- ❌ $SOURCE_IMG: 获取Digest失败" >> sync_status.md
              continue
            fi
            
            # 获取目标镜像Digest
            TARGET_DIGEST=$(skopeo inspect "docker://$TARGET_IMG" 2>/dev/null | jq -r '.Digest' || echo "none")
            
            # 判断是否需要同步
            NEED_SYNC=false
            if [[ "$SOURCE_DIGEST" != "$TARGET_DIGEST" ]]; then
              NEED_SYNC=true
              REASON="Digest不一致"
            elif [[ "${{ github.event.inputs.force_sync }}" == "true" ]]; then
              NEED_SYNC=true
              REASON="手动强制同步"
            fi
            
            if [[ "$NEED_SYNC" == "true" ]]; then
              echo "🔄 开始同步 ($REASON): $SOURCE_IMG → $TARGET_IMG"
              
              # 使用重试机制同步
              if retry skopeo copy "docker://$SOURCE_IMG" "docker://$TARGET_IMG"; then
                echo "✅ 同步完成：$TARGET_IMG"
                echo "- ✅ $SOURCE_IMG → $TARGET_IMG: 同步成功" >> sync_status.md
              else
                echo "❌ 同步失败：$SOURCE_IMG"
                echo "- ❌ $SOURCE_IMG → $TARGET_IMG: 同步失败" >> sync_status.md
                # 不退出，继续同步其他镜像
              fi
            else
              echo "✅ 镜像已是最新，无需同步：$SOURCE_IMG"
              echo "- ⏭️ $SOURCE_IMG: 已是最新" >> sync_status.md
            fi
          done
          
          # 显示同步摘要
          echo -e "\n===== 同步摘要 ====="
          cat sync_status.md

      # 保存同步状态
      - name: Upload sync status
        uses: actions/upload-artifact@v4
        with:
          name: sync-status
          path: sync_status.md

      # 失败通知
      - name: Send failure notification
        if: failure()
        run: |
          echo "同步过程发生错误，请检查日志"
          # 这里可以添加钉钉/企业微信/webhook通知

      # 清理资源
      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/skopeo* 2>/dev/null || true
          docker system prune -f 2>/dev/null || true

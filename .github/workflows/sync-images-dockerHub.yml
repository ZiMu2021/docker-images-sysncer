name: Aliyun-Image-Sync

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 提前适配 Node.js 24

on:
  repository_dispatch:
    types: [sync-image]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_sync:
        description: '强制同步所有镜像'
        required: false
        default: false
  push:
    branches: [ "ImageSyncHub" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-images:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Skopeo and jq
        run: |
          sudo apt-get update && sudo apt-get install -y skopeo jq

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          logout: false

      - name: Define retry function
        run: |
          cat > retry.sh << 'EOF'
          retry() {
            local n=1
            local max=3
            local delay=5
            while true; do
              "$@" && break || {
                if [[ $n -lt $max ]]; then
                  ((n++))
                  echo "命令失败，${delay}秒后重试 ($n/$max)..."
                  sleep $delay;
                else
                  echo "重试${max}次后仍然失败"
                  return 1
                fi
              }
            done
          }
          EOF

      - name: Sync Images to Aliyun
        run: |
          set -e
          source retry.sh
          
          declare -A IMAGE_MAP=(
            ["ghcr.io/openclaw/openclaw:latest"]="registry.cn-hangzhou.aliyuncs.com/zi_mu/openclaw:latest"
            # 可以继续添加更多镜像
          )
          
          echo "# 镜像同步状态 - $(date)" > sync_status.md
          echo "| 源镜像 | 目标镜像 | 状态 | 详情 |" >> sync_status.md
          echo "|--------|----------|------|------|" >> sync_status.md
          
          for SOURCE_IMG in "${!IMAGE_MAP[@]}"; do
            TARGET_IMG=${IMAGE_MAP[$SOURCE_IMG]}
            echo -e "\n===== 检测镜像: $SOURCE_IMG ====="
            
            SOURCE_DIGEST=$(skopeo inspect "docker://$SOURCE_IMG" 2>/dev/null | jq -r '.Digest')
            if [[ -z "$SOURCE_DIGEST" || "$SOURCE_DIGEST" == "null" ]]; then
              echo "⚠️  获取源镜像Digest失败，跳过：$SOURCE_IMG"
              echo "| $SOURCE_IMG | $TARGET_IMG | ❌ 失败 | 获取Digest失败 |" >> sync_status.md
              continue
            fi
            
            TARGET_DIGEST=$(skopeo inspect "docker://$TARGET_IMG" 2>/dev/null | jq -r '.Digest' || echo "none")
            
            NEED_SYNC=false
            if [[ "$SOURCE_DIGEST" != "$TARGET_DIGEST" ]]; then
              NEED_SYNC=true
              REASON="Digest不一致"
            elif [[ "${{ github.event.inputs.force_sync }}" == "true" ]]; then
              NEED_SYNC=true
              REASON="手动强制同步"
            fi
            
            if [[ "$NEED_SYNC" == "true" ]]; then
              echo "🔄 开始同步 ($REASON): $SOURCE_IMG → $TARGET_IMG"
              
              START_TIME=$(date +%s)
              if retry skopeo copy --all "docker://$SOURCE_IMG" "docker://$TARGET_IMG"; then
                END_TIME=$(date +%s)
                DURATION=$((END_TIME - START_TIME))
                echo "✅ 同步完成（耗时 ${DURATION}秒）：$TARGET_IMG"
                echo "| $SOURCE_IMG | $TARGET_IMG | ✅ 成功 | 耗时 ${DURATION}秒 |" >> sync_status.md
              else
                echo "❌ 同步失败：$SOURCE_IMG"
                echo "| $SOURCE_IMG | $TARGET_IMG | ❌ 失败 | 同步错误 |" >> sync_status.md
              fi
            else
              echo "✅ 镜像已是最新，无需同步：$SOURCE_IMG"
              echo "| $SOURCE_IMG | $TARGET_IMG | ⏭️ 跳过 | 已是最新 |" >> sync_status.md
            fi
          done
          
          echo -e "\n===== 同步摘要 ====="
          cat sync_status.md

      - name: Upload sync status
        uses: actions/upload-artifact@v4
        with:
          name: sync-status-${{ github.run_id }}
          path: sync_status.md
          retention-days: 30  # 保留30天

      - name: Send failure notification
        if: failure()
        run: |
          echo "❌ 同步过程发生错误"
          echo "工作流运行: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # 可以添加实际的通知逻辑

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/skopeo* 2>/dev/null || true
          docker system prune -f 2>/dev/null || true
